<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniStream — Anime & Donghua</title>
  <link rel="icon" type="image/jpeg" href="img/icon.jpg">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --bg: #f0f0f5;
      --surface: #ffffff;
      --text: #1a1a2e;
      --muted: #6b7280;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --shadow: 0 20px 60px rgba(0,0,0,0.08);
      --glow: none;
      --rope-color: #6366f1;
      --cursor-glow: rgba(99, 102, 241, 0.2);
      --card-bg: rgba(255,255,255,0.7);
    }

    [data-theme="cinema"] {
      --bg: #0a0a12;
      --surface: #12121f;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.2);
      --shadow: 0 20px 80px rgba(139, 92, 246, 0.1);
      --glow: 0 0 100px rgba(139, 92, 246, 0.08);
      --rope-color: #8b5cf6;
      --cursor-glow: rgba(139, 92, 246, 0.25);
      --card-bg: rgba(18, 18, 31, 0.8);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none !important;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      transition: background 0.6s cubic-bezier(0.4, 0, 0.2, 1), color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
      position: relative;
    }

    /* Custom Cursor */
    .cursor-main {
      position: fixed;
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.08s ease, width 0.2s ease, height 0.2s ease;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }

    .cursor-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }

    .cursor-trail {
      position: fixed;
      width: 10px;
      height: 10px;
      background: var(--cursor-glow);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      filter: blur(6px);
    }

    .cursor-main.hovering {
      width: 48px;
      height: 48px;
      border-width: 1.5px;
      background: var(--accent-glow);
    }

    /* Background Anime Pattern */
    .bg-pattern {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236366f1' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      transition: opacity 0.6s;
    }

    [data-theme="cinema"] .bg-pattern {
      opacity: 0.06;
    }

    /* Top Bar */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      z-index: 50;
      backdrop-filter: blur(20px);
      background: linear-gradient(to bottom, var(--bg), transparent);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo:hover {
      transform: scale(1.06);
    }

    .logo-icon {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 8px var(--accent-glow));
    }

    .tagline {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-left: 0.5rem;
    }

    /* Rope Toggle — TOP RIGHT */
    .rope-container {
      position: fixed;
      right: 30px;
      top: 80px;
      height: 160px;
      width: 50px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .rope-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      font-weight: 700;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transition: color 0.3s;
    }

    .rope {
      width: 3px;
      height: 100px;
      background: linear-gradient(to bottom, var(--rope-color) 0%, var(--rope-color) var(--rope-progress, 0%), var(--muted) var(--rope-progress, 0%), var(--muted) 100%);
      border-radius: 3px;
      position: relative;
      transition: background 0.3s;
    }

    .rope-handle {
      position: absolute;
      left: 50%;
      top: var(--rope-progress, 0%);
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 3px solid var(--rope-color);
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15), 0 0 0 4px var(--bg), 0 0 15px var(--accent-glow);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .rope-handle:active {
      transform: translate(-50%, -50%) scale(0.92);
    }

    .rope-handle::before {
      content: '☀️';
    }

    [data-theme="cinema"] .rope-handle::before {
      content: '🌙';
    }

    .rope-container:hover .rope-handle {
      transform: translate(-50%, -50%) scale(1.2);
      box-shadow: 0 8px 30px rgba(0,0,0,0.25), 0 0 0 6px var(--bg), 0 0 25px var(--accent);
    }

    .rope-hitbox {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 50px;
      transform: translateX(-50%);
      cursor: grab;
    }

    .rope-hitbox:active {
      cursor: grabbing;
    }

    /* Main Layout */
    .main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 100px 2rem 4rem;
      gap: 1.5rem;
    }

    /* Anime Info Card */
    .info-card {
      width: 90%;
      max-width: 1000px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s 0.2s forwards;
    }

    .anime-poster {
      width: 80px;
      height: 110px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--rope-color));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      flex-shrink: 0;
      box-shadow: 0 8px 30px var(--accent-glow);
    }

    .anime-meta {
      flex: 1;
    }

    .anime-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.3rem;
      background: linear-gradient(135deg, var(--accent), var(--rope-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .anime-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .tag {
      font-size: 0.7rem;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      background: var(--accent-glow);
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.5px;
      border: 1px solid var(--accent);
      opacity: 0.8;
    }

    /* Player */
    .player-wrapper {
      width: 90%;
      max-width: 1000px;
      aspect-ratio: 16/9;
      background: var(--surface);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow), var(--glow);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      border: 1px solid rgba(255,255,255,0.05);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    /* Controls */
    .controls-bar {
      width: 90%;
      max-width: 1000px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      gap: 1rem;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.5s 0.4s forwards;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .quality-select {
      background: transparent;
      border: 1.5px solid var(--muted);
      color: var(--text);
      padding: 0.5rem 1rem;
      border-radius: 12px;
      font-size: 0.8rem;
      outline: none;
      transition: all 0.3s;
      font-weight: 600;
    }

    .quality-select:hover {
      border-color: var(--accent);
    }

    .subtitle-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.3s;
      padding: 0.5rem 1rem;
      border-radius: 12px;
      border: 1.5px solid var(--muted);
    }

    .subtitle-toggle:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .subtitle-toggle input {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
    }

    /* Episode Grid */
    .episode-grid {
      width: 90%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.5s 0.5s forwards;
    }

    .ep-label {
      width: 100%;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      grid-column: 1 / -1;
    }

    .ep-btn {
      aspect-ratio: 1;
      border-radius: 14px;
      background: var(--card-bg);
      border: 1.5px solid transparent;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      backdrop-filter: blur(10px);
    }

    .ep-btn:hover {
      border-color: var(--accent);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    .ep-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 25px var(--accent-glow);
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      text-align: center;
      z-index: 50;
      opacity: 0;
      animation: fadeUp 0.5s 0.6s forwards;
    }

    .footer a {
      color: var(--muted);
      font-size: 0.8rem;
      text-decoration: none;
      transition: all 0.3s;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .footer a:hover {
      color: var(--accent);
      letter-spacing: 1.5px;
    }

    /* Popcorn / Anime Character */
    .popcorn-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: var(--accent);
      border: none;
      color: #fff;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 1.6rem;
      cursor: pointer;
      opacity: 0.9;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      box-shadow: 0 10px 40px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popcorn-btn:hover {
      opacity: 1;
      transform: scale(1.25) rotate(10deg);
      box-shadow: 0 15px 50px var(--accent-glow);
    }

    /* Anime Character Popup */
    .anime-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 180px;
      height: 180px;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0) rotate(-180deg);
      transition: none;
    }

    .anime-popup.show {
      animation: animePop 1.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    @keyframes animePop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0) rotate(-180deg);
      }
      30% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.3) rotate(15deg);
      }
      60% {
        transform: translate(-50%, -50%) scale(0.95) rotate(-5deg) translateY(-20px);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.1) rotate(0deg) translateY(60px);
      }
    }

    .anime-popup img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4));
    }

    /* Loading */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--muted);
      font-size: 1rem;
      font-weight: 600;
      display: none;
      text-align: center;
    }

    .loading::after {
      content: '';
      display: block;
      width: 40px;
      height: 40px;
      margin: 1rem auto 0;
      border: 3px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--muted);
      text-align: center;
      padding: 2rem;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .error-msg a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    /* Animations */
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Particles */
    .particle {
      position: fixed;
      pointer-events: none;
      z-index: 9997;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .info-card {
        flex-direction: column;
        text-align: center;
        padding: 1.5rem;
      }
      
      .anime-poster {
        width: 100px;
        height: 140px;
      }
      
      .rope-container {
        right: 15px;
        top: 70px;
        height: 120px;
      }
      
      .rope {
        height: 70px;
      }
    }
  </style>
</head>
<body>
  <!-- Background Pattern -->
  <div class="bg-pattern"></div>

  <!-- Custom Cursor -->
  <div class="cursor-main" id="cursorMain"></div>
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <!-- Top Bar -->
  <div class="top-bar">
    <a href="https://t.me/tgtomoviesbot" class="logo" target="_blank">
      <span class="logo-icon">⛩️</span>
      <span>AniStream</span>
      <span class="tagline">Anime & Donghua</span>
    </a>
  </div>

  <!-- Rope Toggle — TOP RIGHT -->
  <div class="rope-container" id="ropeContainer">
    <span class="rope-label">Theme</span>
    <div class="rope" id="rope" style="--rope-progress: 0%;">
      <div class="rope-hitbox" id="ropeHitbox"></div>
      <div class="rope-handle" id="ropeHandle"></div>
    </div>
    <span class="rope-label" style="transform: rotate(180deg);">Drag</span>
  </div>

  <!-- Main Content -->
  <div class="main">
    <!-- Anime Info -->
    <div class="info-card" id="infoCard" style="display:none;">
      <div class="anime-poster">🎌</div>
      <div class="anime-meta">
        <div class="anime-title" id="animeTitle">Loading...</div>
        <div style="color: var(--muted); font-size: 0.85rem;" id="animeSub">Episode 1</div>
        <div class="anime-tags">
          <span class="tag">Sub</span>
          <span class="tag">HD</span>
          <span class="tag">Donghua</span>
        </div>
      </div>
    </div>

    <!-- Player -->
    <div class="player-wrapper" id="player">
      <div class="loading" id="loading">Loading stream...</div>
    </div>

    <!-- Controls -->
    <div class="controls-bar" id="controls" style="display:none;">
      <div class="control-group">
        <select class="quality-select" id="quality">
          <option value="auto">Auto Quality</option>
        </select>
      </div>
      <div class="control-group">
        <label class="subtitle-toggle">
          <input type="checkbox" id="subtitles">
          <span>CC Subtitles</span>
        </label>
      </div>
    </div>

    <!-- Episode Grid -->
    <div class="episode-grid" id="epGrid" style="display:none;">
      <div class="ep-label">Episodes</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://t.me/tgtomoviesbot" target="_blank">@AniStreamBot</a>
  </div>

  <!-- Popcorn Button -->
  <button class="popcorn-btn" id="popcornBtn" title="Surprise!">🍥</button>

  <!-- Anime Character Popup -->
  <div class="anime-popup" id="animePopup">
    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=anime&backgroundColor=b6e3f4" alt="Anime Character">
  </div>

  <script>
    // ===== CUSTOM CURSOR =====
    const cursorMain = document.getElementById('cursorMain');
    const cursorDot = document.getElementById('cursorDot');
    const cursorTrail = document.getElementById('cursorTrail');
    let mouseX = 0, mouseY = 0;
    let trailX = 0, trailY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      cursorMain.style.left = mouseX + 'px';
      cursorMain.style.top = mouseY + 'px';
      cursorDot.style.left = mouseX + 'px';
      cursorDot.style.top = mouseY + 'px';
      if (Math.random() > 0.8) spawnParticle(mouseX, mouseY);
    });

    function animateTrail() {
      trailX += (mouseX - trailX) * 0.12;
      trailY += (mouseY - trailY) * 0.12;
      cursorTrail.style.left = trailX + 'px';
      cursorTrail.style.top = trailY + 'px';
      requestAnimationFrame(animateTrail);
    }
    animateTrail();

    document.querySelectorAll('a, button, select, .rope-hitbox, .ep-btn').forEach(el => {
      el.addEventListener('mouseenter', () => cursorMain.classList.add('hovering'));
      el.addEventListener('mouseleave', () => cursorMain.classList.remove('hovering'));
    });

    function spawnParticle(x, y) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 5 + 2;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      document.body.appendChild(p);
      const angle = Math.random() * Math.PI * 2;
      const velocity = Math.random() * 25 + 8;
      let opacity = 0.5, px = x, py = y;
      function animate() {
        opacity -= 0.015;
        px += Math.cos(angle) * velocity * 0.04;
        py += Math.sin(angle) * velocity * 0.04 - 0.5;
        p.style.opacity = opacity;
        p.style.left = px + 'px';
        p.style.top = py + 'px';
        p.style.transform = `scale(${opacity})`;
        if (opacity > 0) requestAnimationFrame(animate);
        else p.remove();
      }
      animate();
    }

    // ===== ROPE THEME TOGGLE =====
    const rope = document.getElementById('rope');
    const ropeHitbox = document.getElementById('ropeHitbox');
    const html = document.documentElement;
    let isDragging = false;
    let isCinema = false;

    function setRopeProgress(percent) {
      rope.style.setProperty('--rope-progress', percent + '%');
    }

    function toggleTheme() {
      isCinema = !isCinema;
      html.setAttribute('data-theme', isCinema ? 'cinema' : 'light');
      setRopeProgress(isCinema ? 100 : 0);
    }

    ropeHitbox.addEventListener('click', toggleTheme);

    ropeHitbox.addEventListener('mousedown', () => { isDragging = true; });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const rect = rope.getBoundingClientRect();
      const percent = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
      setRopeProgress(percent);
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      const current = parseFloat(rope.style.getPropertyValue('--rope-progress') || 0);
      if (current > 50 && !isCinema) toggleTheme();
      else if (current <= 50 && isCinema) toggleTheme();
      else setRopeProgress(isCinema ? 100 : 0);
    });

    // Touch
    ropeHitbox.addEventListener('touchstart', (e) => { isDragging = true; e.preventDefault(); });
    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const rect = rope.getBoundingClientRect();
      const touch = e.touches[0];
      const percent = Math.max(0, Math.min(100, ((touch.clientY - rect.top) / rect.height) * 100));
      setRopeProgress(percent);
    });
    document.addEventListener('touchend', () => {
      if (!isDragging) return;
      isDragging = false;
      const current = parseFloat(rope.style.getPropertyValue('--rope-progress') || 0);
      if (current > 50 && !isCinema) toggleTheme();
      else if (current <= 50 && isCinema) toggleTheme();
      else setRopeProgress(isCinema ? 100 : 0);
    });

    // ===== VIDEO PLAYER =====
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('stream');
    const title = urlParams.get('title') || 'Unknown Anime';
    const player = document.getElementById('player');
    const loading = document.getElementById('loading');
    const controls = document.getElementById('controls');
    const qualitySelect = document.getElementById('quality');
    const infoCard = document.getElementById('infoCard');

    // Show info
    document.getElementById('animeTitle').textContent = decodeURIComponent(title);
    infoCard.style.display = 'flex';

    if (streamUrl) {
      loading.style.display = 'block';
      
      const video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.playsInline = true;
      
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(streamUrl);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          loading.style.display = 'none';
          controls.style.display = 'flex';
          
          // Populate qualities
          hls.levels.forEach((level, i) => {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = level.height + 'p';
            qualitySelect.appendChild(option);
          });
        });

        qualitySelect.addEventListener('change', () => {
          const val = qualitySelect.value;
          hls.currentLevel = val === 'auto' ? -1 : parseInt(val);
        });

      } else {
        video.src = streamUrl;
        video.addEventListener('loadeddata', () => {
          loading.style.display = 'none';
          controls.style.display = 'flex';
        });
      }

      player.innerHTML = '';
      player.appendChild(video);

      // Generate fake episode buttons
      const epGrid = document.getElementById('epGrid');
      epGrid.style.display = 'grid';
      for (let i = 1; i <= 12; i++) {
        const btn = document.createElement('button');
        btn.className = 'ep-btn' + (i === 1 ? ' active' : '');
        btn.textContent = i;
        epGrid.appendChild(btn);
      }

      // Subtitles toggle
      document.getElementById('subtitles').addEventListener('change', (e) => {
        const toast = document.createElement('div');
        toast.textContent = e.target.checked ? 'Subtitles enabled (if available)' : 'Subtitles disabled';
        toast.style.cssText = 'position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);padding:12px 24px;border-radius:24px;font-size:0.8rem;font-weight:600;z-index:300;box-shadow:var(--shadow);border:1px solid var(--accent);animation:fadeUp 0.3s;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      });

    } else {
      player.innerHTML = '<div class="error-msg">No stream URL provided.<br><a href="https://t.me/tgtomoviesbot">Open Bot to Watch</a></div>';
    }

    // ===== POPUP =====
    document.getElementById('popcornBtn').addEventListener('click', () => {
      const s = document.getElementById('animePopup');
      s.classList.remove('show');
      void s.offsetWidth;
      s.classList.add('show');
    });
  </script>
</body>
</html>
